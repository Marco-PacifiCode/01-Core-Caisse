name: Deploy (manuel)

# Moteur core : deploiement MANUEL uniquement (workflow_dispatch) — backend + migrations Prisma.
# PAS de trigger [deploy] auto. Les migrations (db:migrate) restent une etape MANUELLE deliberee (Marco),
# JAMAIS lancees ici. Cf. Core-Compta / Core-Stock deploy.yml (meme contrat).

on:
  workflow_dispatch:

concurrency:
  group: deploy-core-caisse
  cancel-in-progress: false

jobs:
  deploy:
    name: SSH VPS deploy moteur (sans db:migrate)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Deploy moteur on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /home/deploy/moteurs/01-Core-Caisse
            git fetch origin main
            git reset --hard origin/main
            cd core
            npm ci
            npm run build
            pm2 reload core-caisse --update-env
            # NB: migrations Prisma (db:migrate) NON executees ici — etape manuelle deliberee.
            sleep 4
            pm2 jlist | node -e "let d='';process.stdin.on('data',c=>d+=c).on('end',()=>{const p=JSON.parse(d).find(x=>x.name==='core-caisse');if(p&&p.pm2_env.status==='online'){console.log('core-caisse online')}else{console.error('core-caisse PAS online');process.exit(1)}})"
